<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store Settings | Local Cart</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .settings-card { max-width: 600px; margin: 40px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #2f3542; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .profile-preview { width: 100%; height: 200px; border-radius: 12px; background: #eee; margin-bottom: 15px; background-size: cover; background-position: center; border: 1px solid #ddd; }
    </style>
</head>
<body style="background: #f8f9fa;">

    <div class="settings-card">
        <a href="business_dashboard.html" style="text-decoration: none; color: #777; font-weight: bold;">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <h2 style="margin-top: 20px;"><i class="fas fa-store"></i> Store Settings</h2>
        <p style="color: #666; font-size: 14px;">Update your business identity and contact info.</p>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div id="shop-img-preview" class="profile-preview"></div>
        <div class="input-group">
            <label>Change Shop Image</label>
            <input type="file" id="s-file" accept="image/*" onchange="uploadShopImage()">
            <small id="up-status" style="color: #2ed573; font-size: 12px;"></small>
        </div>

        <form id="edit-shop-form">
            <div class="input-group"><label>Shop Name</label><input type="text" id="s-name" required></div>
            <div class="input-group"><label>WhatsApp Number</label><input type="tel" id="s-phone" required></div>
            <div class="input-group"><label>Dealing In (Category)</label><input type="text" id="s-deal" required></div>
            <div class="input-group"><label>Full Address</label><textarea id="s-address" rows="3"></textarea></div>
            
            <input type="hidden" id="s-url">

            <button type="submit" class="main-btn" style="width: 100%; margin-top: 20px; background: #2f3542;">
                Save Store Details
            </button>
        </form>
    </div>
<script>
        const userEmail = localStorage.getItem('userEmail');
        
        // --- CONFIGURATION ---
        const API_BASE_URL = 'https://localcart-c6il.onrender.com';

        window.onload = async () => {
            if(!userEmail) {
                alert("Please login as a business owner first!");
                window.location.href = 'index.html';
                return;
            }
            fetchShopDetails();
        };

        async function fetchShopDetails() {
            try {
                // Updated: Localhost ki jagah Render URL use kiya
                const res = await fetch(`${API_BASE_URL}/api/get-shop-all/${userEmail}`);
                const data = await res.json();
                if(data.success && data.shop) {
                    const s = data.shop;
                    document.getElementById('s-name').value = s.name || '';
                    document.getElementById('s-phone').value = s.phone || '';
                    document.getElementById('s-deal').value = s.dealIn || '';
                    document.getElementById('s-address').value = s.address || '';
                    document.getElementById('s-url').value = s.image || '';
                    if(s.image) {
                        document.getElementById('shop-img-preview').style.backgroundImage = `url('${s.image}')`;
                    }
                }
            } catch (err) {
                console.error("Error fetching shop details:", err);
            }
        }

        async function uploadShopImage() {
            const fileInput = document.getElementById('s-file');
            const file = fileInput.files[0];
            if(!file) return;

            const formData = new FormData();
            formData.append('shopImage', file);

            document.getElementById('up-status').innerText = "Uploading... ⏳";
            
            try {
                // Updated: Localhost ki jagah Render URL use kiya
                const res = await fetch(`${API_BASE_URL}/api/upload`, { 
                    method: 'POST', 
                    body: formData 
                });
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('s-url').value = data.imageUrl;
                    document.getElementById('shop-img-preview').style.backgroundImage = `url('${data.imageUrl}')`;
                    document.getElementById('up-status').innerText = "Image updated! ✅";
                }
            } catch (err) {
                document.getElementById('up-status').innerText = "Upload failed! ❌";
                console.error("Upload error:", err);
            }
        }

        document.getElementById('edit-shop-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Saving... ⏳";
            submitBtn.disabled = true;

            const payload = {
                ownerEmail: userEmail,
                name: document.getElementById('s-name').value,
                phone: document.getElementById('s-phone').value,
                dealIn: document.getElementById('s-deal').value,
                address: document.getElementById('s-address').value,
                image: document.getElementById('s-url').value
            };

            try {
                // Updated: Localhost ki jagah Render URL use kiya
                const res = await fetch(`${API_BASE_URL}/api/shop-setup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    alert("Store details updated successfully! 🚀");
                    window.location.href = 'business_dashboard.html';
                } else {
                    alert("Failed to update store. Try again.");
                }
            } catch (err) {
                console.error("Form error:", err);
                alert("Server error! Please check if your backend is live.");
            } finally {
                submitBtn.innerText = "Save Store Details";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
