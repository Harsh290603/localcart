<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Cart | Join Us</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="welcome-section">
            <div class="inner-content">
                <h1>Local<span>Cart</span></h1>
                <p>Bringing your local market to your doorstep.</p>
            </div>
            <ul class="floating-icons">
                <li><i class="fas fa-shopping-cart"></i></li>
                <li><i class="fas fa-bag-shopping"></i></li>
                <li><i class="fas fa-store"></i></li>
                <li><i class="fas fa-cart-plus"></i></li>
            </ul>
        </div>
        <div class="form-section">
            <div class="form-box">
                <!-- Changed to Login Title by default -->
                <h2 id="form-title">Welcome Back</h2>
                
                <form id="auth-form">
                    <div class="role-container">
                        <div class="radio-group">
                            <!-- Customer is checked by default -->
                            <input type="radio" name="role" value="customer" id="customer" checked>
                            <label for="customer">
                                <i class="fas fa-user"></i> Customer
                            </label>

                            <input type="radio" name="role" value="business" id="business">
                            <label for="business">
                                <i class="fas fa-store"></i> Business
                            </label>
                        </div>
                    </div>
                    
                    <!-- Hidden by default for Login view -->
                    <div class="input-group" id="name-field" style="display: none;">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Full Name" id="username">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" placeholder="Email Address" id="email" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Password" id="password" required>
                        <i class="fas fa-eye" id="togglePassword"></i>
                    </div>

                    <!-- Button text set to Login -->
                    <button type="submit" class="main-btn" id="submit-btn">Login</button>
                </form>

                <!-- Toggle text updated for Login state -->
                <p class="toggle-text" id="toggle-wrapper">
                    New here? <span id="toggle-link" style="cursor: pointer; color: var(--primary-color); font-weight: 600;">Create Account</span>
                </p>
            </div>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
