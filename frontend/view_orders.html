<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Orders | Local Cart</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .orders-container { max-width: 900px; margin: 30px auto; padding: 20px; }
        .order-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.3s; }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        .order-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f2f6; padding-bottom: 15px; margin-bottom: 20px; }
        .order-id { font-family: monospace; background: #f1f2f6; padding: 4px 10px; border-radius: 5px; font-weight: bold; color: #2f3542; }
        
        .cust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #fffafa; padding: 15px; border-radius: 12px; border: 1px solid #fff1f2; }
        .info-item { font-size: 14px; color: #57606f; margin-bottom: 5px; }
        .info-item b { color: #2f3542; display: block; font-size: 16px; margin-top: 2px; }

        .items-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .items-table th { text-align: left; color: #a4b0be; font-size: 12px; text-transform: uppercase; padding-bottom: 10px; }
        .items-table td { padding: 10px 0; border-bottom: 1px solid #fafafa; color: #2f3542; }

        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 2px solid #f8f9fa; }
        .subtotal-box { text-align: right; }
        .subtotal-box span { color: #777; font-size: 14px; }
        .subtotal-box h3 { margin: 0; color: #ff4757; font-size: 22px; }

        .action-btn { background: #2ed573; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .action-btn:hover { background: #26af5a; transform: scale(1.05); }
        
        .status-badge { padding: 6px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; }
        .badge-pending { background: #fff1e0; color: #ff9f43; }
        .badge-completed { background: #e3fcef; color: #2ed573; }
    </style>
</head>
<body style="background: #fdfdfd;">

    <nav class="navbar">
        <div class="logo" onclick="location.href='business_dashboard.html'" style="cursor:pointer;">Local<span>Cart</span> Business</div>
        <button class="logout-btn" onclick="location.href='business_dashboard.html'"><i class="fas fa-arrow-left"></i> Dashboard</button>
    </nav>

    <div class="orders-container">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div>
                <h1 id="page-title" style="margin:0; color:#2f3542;">Incoming Orders</h1>
                <p id="page-desc" style="color:#777; margin:5px 0 0 0;">Manage your deliveries and customers</p>
            </div>
            <div id="status-toggle-info"></div>
        </div>

        <div id="orders-list">
            <div style="text-align:center; padding:100px; color:#ccc;">
                <i class="fas fa-circle-notch fa-spin fa-3x"></i>
                <p style="margin-top:15px;">Fetching your orders...</p>
            </div>
        </div>
    </div>

 <script>
        const params = new URLSearchParams(window.location.search);
        const filterStatus = params.get('status') || 'pending';
        const ownerEmail = localStorage.getItem('userEmail'); 

        // --- CONFIGURATION ---
        const API_BASE_URL = 'https://localcart-c6il.onrender.com';

        window.onload = () => {
            if(!ownerEmail) {
                location.href = 'index.html';
                return;
            }
            document.getElementById('page-title').innerText = filterStatus === 'pending' ? "Pending Orders" : "Order History";
            fetchOrders();
        };

        async function fetchOrders() {
            try {
                // Updated: Localhost ki jagah Render URL use kiya
                const res = await fetch(`${API_BASE_URL}/api/owner-orders/${ownerEmail}`);
                const data = await res.json();

                const list = document.getElementById('orders-list');
                
                // Status filter (pending/completed)
                const filteredOrders = data.orders.filter(o => o.status.toLowerCase() === filterStatus.toLowerCase());

                if(filteredOrders.length === 0) {
                    list.innerHTML = `
                        <div style="text-align:center; padding:80px; background:white; border-radius:20px;">
                            <i class="fas fa-box-open" style="font-size:50px; color:#eee; margin-bottom:15px;"></i>
                            <h3 style="color:#ccc;">No ${filterStatus} orders found</h3>
                        </div>`;
                    return;
                }

                list.innerHTML = "";

                // Naye orders upar dikhane ke liye reverse kiya
                filteredOrders.reverse().forEach(order => {
                    // Logic: Sirf is shop ke items dikhao (Agar marketplace order hai)
                    const myItems = order.items.filter(item => item.shopEmail === ownerEmail);
                    const mySubtotal = myItems.reduce((sum, i) => sum + (i.price * i.qty), 0);

                    const card = document.createElement('div');
                    card.className = 'order-card';
                    
                    let itemsHtml = "";
                    myItems.forEach(item => {
                        itemsHtml += `
                            <tr>
                                <td>${item.name}</td>
                                <td style="text-align:center;">${item.qty}</td>
                                <td style="text-align:right;">₹${item.price * item.qty}</td>
                            </tr>
                        `;
                    });

                    card.innerHTML = `
                        <div class="order-header">
                            <div><span class="info-item">Order ID:</span> <span class="order-id">#${order._id.slice(-6).toUpperCase()}</span></div>
                            <span class="status-badge badge-${filterStatus}">${order.status}</span>
                        </div>
                        
                        <div class="cust-grid">
                            <div><span class="info-item">Customer Name</span><b>${order.customerName}</b></div>
                            <div><span class="info-item">Phone Number</span><b>${order.customerPhone}</b></div>
                            <div style="grid-column: 1 / -1;"><span class="info-item">Delivery Address</span><b>${order.customerAddress}</b></div>
                        </div>

                        <table class="items-table">
                            <thead>
                                <tr><th>Product Name</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Total</th></tr>
                            </thead>
                            <tbody>${itemsHtml}</tbody>
                        </table>

                        <div class="order-footer">
                            <div class="subtotal-box">
                                <span>Your Shop Subtotal</span>
                                <h3>₹${mySubtotal}</h3>
                            </div>
                            ${filterStatus === 'pending' ? `
                                <button class="action-btn" id="btn-${order._id}" onclick="completeOrder('${order._id}')">
                                    <i class="fas fa-shipping-fast"></i> Mark as Delivered
                                </button>
                            ` : `
                                <div style="color:#2ed573; font-weight:bold;"><i class="fas fa-check-circle"></i> Successfully Delivered</div>
                            `}
                        </div>
                    `;
                    list.appendChild(card);
                });
            } catch (err) { 
                console.error("Order Fetch Error:", err);
                document.getElementById('orders-list').innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <p style="color:red;">Server Connecting... ⏳</p>
                        <small>Backend start hone mein 30-40 seconds lag sakte hain.</small>
                    </div>`;
            }
        }

        async function completeOrder(orderId) {
            if(!confirm("Bhai, order deliver ho gaya hai?")) return;

            const btn = document.getElementById(`btn-${orderId}`);
            btn.innerText = "Updating... ⏳";
            btn.disabled = true;

            try {
                // Updated: Localhost ki jagah Render URL use kiya
                const res = await fetch(`${API_BASE_URL}/api/update-order-status`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ orderId: orderId, status: 'completed' })
                });

                if(res.ok) {
                    alert("Order marked as Completed! ✅");
                    fetchOrders(); // List ko refresh karein
                } else {
                    alert("Update fail ho gaya. Status badal nahi paya.");
                }
            } catch (err) {
                console.error("Update Error:", err);
                alert("Server Connection Error!");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
