<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Local Cart</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* --- NEW: IMAGE GALLERY STYLES --- */
        .gallery-container { position: relative; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .main-image-wrapper { position: relative; width: 100%; border-radius: 15px; overflow: hidden; border: 1px solid #eee; aspect-ratio: 1/1; background: #f9f9f9; }
        .product-image { width: 100%; height: 100%; object-fit: contain; }
        
        /* Arrows */
        .gallery-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 18px; cursor: pointer; color: #2f3542; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.3s; z-index: 10; display: flex; justify-content: center; align-items: center; }
        .gallery-arrow:hover { background: white; color: #ff4757; transform: translateY(-50%) scale(1.1); }
        .arrow-left { left: 10px; }
        .arrow-right { right: 10px; }
        
        /* Thumbnails */
        .thumbnails-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; }
        .thumbnails-container::-webkit-scrollbar { height: 6px; }
        .thumbnails-container::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .thumbnail { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; cursor: pointer; border: 2px solid transparent; opacity: 0.6; transition: 0.3s; background: #f1f2f6; }
        .thumbnail.active { border-color: #ff4757; opacity: 1; }
        .thumbnail:hover { opacity: 1; }
        /* --------------------------------- */

        .product-info { display: flex; flex-direction: column; justify-content: center; }
        .product-tag { background: #fff1f2; color: #ff4757; padding: 5px 12px; border-radius: 8px; font-size: 12px; font-weight: 800; text-transform: uppercase; display: inline-block; width: max-content; margin-bottom: 15px;}
        .product-title { font-size: 28px; color: #2f3542; margin-bottom: 10px; }
        .product-price { font-size: 24px; font-weight: bold; color: #2ed573; margin-bottom: 20px; }
        .product-desc { color: #747d8c; line-height: 1.6; margin-bottom: 30px; }
        
        .qty-selector { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .qty-btn { background: #f1f2f6; border: none; width: 40px; height: 40px; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; color: #2f3542; transition: 0.3s; }
        .qty-btn:hover { background: #dfe4ea; }
        .qty-display { font-size: 18px; font-weight: bold; min-width: 30px; text-align: center; }

        .add-to-cart-btn { background: #2f3542; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;}
        .add-to-cart-btn:hover { background: #ff4757; }
        
        @media (max-width: 768px) { .product-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body style="background: #fdfdfd;">

    <nav class="navbar">
        <div class="logo" onclick="history.back()" style="cursor:pointer;"><i class="fas fa-arrow-left"></i> Back</div>
        <div class="nav-right" style="display: flex; align-items: center; gap: 20px;">
            <div class="cart-icon-container" onclick="location.href='cart.html'" style="position: relative; cursor: pointer;">
                <i class="fas fa-shopping-cart" style="font-size: 22px; color: #2f3542;"></i>
                <span id="global-cart-count" class="cart-badge">0</span>
            </div>
        </div>
    </nav>

    <div class="container" id="product-details-content">
        </div>

    <script>
        let currentProduct = null;
        let qty = 1;
        let currentImgIndex = 0; // Current photo ka number
        let productImages = []; // Saari photos array mein aayengi

        window.onload = () => {
            updateGlobalCartBadge();
            const productData = localStorage.getItem('viewProduct');
            
            if(!productData) {
                alert("No product selected!");
                history.back();
                return;
            }
            
            currentProduct = JSON.parse(productData);
            
            // Photos check karo, agar empty hai toh placeholder daal do
            if (currentProduct.images && currentProduct.images.length > 0) {
                productImages = currentProduct.images;
            } else {
                productImages = ['https://via.placeholder.com/500?text=No+Image'];
            }

            renderProduct();
        };

        function renderProduct() {
            const container = document.getElementById('product-details-content');
            
            // 1. Multiple images ke arrows ka HTML
            let arrowsHtml = '';
            let thumbnailsHtml = '';

            if (productImages.length > 1) {
                arrowsHtml = `
                    <button class="gallery-arrow arrow-left" onclick="changeImageSlide(-1)"><i class="fas fa-chevron-left"></i></button>
                    <button class="gallery-arrow arrow-right" onclick="changeImageSlide(1)"><i class="fas fa-chevron-right"></i></button>
                `;

                // Thumbnails ka HTML
                productImages.forEach((imgUrl, index) => {
                    const activeClass = index === 0 ? 'active' : '';
                    thumbnailsHtml += `<img src="${imgUrl}" class="thumbnail ${activeClass}" onclick="selectImage(${index})" id="thumb-${index}">`;
                });
            }

            container.innerHTML = `
                <div class="product-container">
                    
                    <div class="gallery-container">
                        <div class="main-image-wrapper">
                            ${arrowsHtml}
                            <img src="${productImages[0]}" alt="${currentProduct.name}" class="product-image" id="main-product-image">
                        </div>
                        <div class="thumbnails-container" id="thumbnails-wrapper">
                            ${thumbnailsHtml}
                        </div>
                    </div>

                    <div class="product-info">
                        <span class="product-tag">${currentProduct.category || 'General'}</span>
                        <h1 class="product-title">${currentProduct.name}</h1>
                        <div class="product-price">₹${currentProduct.price}</div>
                        <p class="product-desc">${currentProduct.description || 'No description available for this product.'}</p>
                        
                        <div class="qty-selector">
                            <button class="qty-btn" onclick="changeQty(-1)">-</button>
                            <span class="qty-display" id="product-qty">${qty}</span>
                            <button class="qty-btn" onclick="changeQty(1)">+</button>
                        </div>

                        <button class="add-to-cart-btn" onclick="addToCart()">
                            <i class="fas fa-shopping-cart"></i> Add to Cart
                        </button>
                    </div>
                </div>
            `;
        }

        // --- GALLERY LOGIC ---
        function changeImageSlide(direction) {
            currentImgIndex += direction;
            
            // Circular rotation (aakhri se pehle par, pehle se aakhri par)
            if (currentImgIndex >= productImages.length) {
                currentImgIndex = 0;
            } else if (currentImgIndex < 0) {
                currentImgIndex = productImages.length - 1;
            }
            
            updateGalleryUI();
        }

        function selectImage(index) {
            currentImgIndex = index;
            updateGalleryUI();
        }

        function updateGalleryUI() {
            // Main image change karo
            document.getElementById('main-product-image').src = productImages[currentImgIndex];

            // Thumbnails ka active status change karo
            if (productImages.length > 1) {
                document.querySelectorAll('.thumbnail').forEach((thumb, index) => {
                    if (index === currentImgIndex) {
                        thumb.classList.add('active');
                    } else {
                        thumb.classList.remove('active');
                    }
                });
            }
        }
        // ---------------------

        function changeQty(change) {
            qty += change;
            if(qty < 1) qty = 1;
            document.getElementById('product-qty').innerText = qty;
        }

        function addToCart() {
            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existing = cart.find(item => item._id === currentProduct._id);
            
            if(existing) {
                existing.qty += qty;
            } else {
                cart.push({
                    ...currentProduct,
                    qty: qty,
                    shopName: localStorage.getItem('currentShopName') || 'Local Store' 
                });
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateGlobalCartBadge();
            alert("Added to Cart Successfully! ✅");
        }

        function updateGlobalCartBadge() {
            const cartData = JSON.parse(localStorage.getItem('cart') || '[]');
            const totalItems = cartData.reduce((sum, item) => sum + item.qty, 0);
            const badge = document.getElementById('global-cart-count');
            if (badge) {
                badge.innerText = totalItems;
                badge.style.display = totalItems > 0 ? 'block' : 'none';
            }
        }
    </script>
</body>
</html>
