<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Local Cart | Shop Menu</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card-zomato { 
            background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #f1f1f1;
        }
        /* Quantity Controls */
        .qty-controls { display: flex; align-items: center; gap: 10px; background: #ff4757; color: white; border-radius: 8px; padding: 5px 10px; }
        .qty-btn { cursor: pointer; font-weight: bold; font-size: 18px; padding: 0 5px; }
        .add-btn { border: 1px solid #ff4757; color: #ff4757; background: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .add-btn:hover { background: #fff1f2; }

        /* Floating Cart Strip */
        .cart-strip { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 500px; background: #2ed573; color: white; 
            padding: 15px 25px; border-radius: 15px; display: none; 
            justify-content: space-between; align-items: center; z-index: 1000;
            box-shadow: 0 10px 30px rgba(46, 213, 115, 0.3);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { bottom: -100px; } to { bottom: 20px; } }
    </style>
</head>
<body style="background: #fdfdfd;">
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='customer_dashboard.html'" style="cursor:pointer;">
            <i class="fas fa-chevron-left"></i> Local<span>Cart</span>
        </div>
    </nav>

    <div id="shop-header">
        <div class="shop-banner" id="b-img" style="height:200px; background-size:cover; position:relative;">
            <div style="position:absolute; bottom:0; width:100%; padding:20px; background:linear-gradient(transparent, rgba(0,0,0,0.8)); color:white;">
                <h1 id="b-name">Loading...</h1>
                <p id="b-deal"></p>
            </div>
        </div>
    </div>

    <div class="container" style="margin-top: 20px; padding-bottom: 100px;">
        <h3 id="shop-title">Menu</h3>
        <div id="item-list" style="margin-top:15px;"></div>
    </div>

    <div class="cart-strip" id="cart-strip">
        <div id="cart-info">
            <span id="item-count">0</span> Items | ₹<span id="total-amount">0</span>
        </div>
        <div onclick="checkout()" style="cursor:pointer; font-weight:bold;">
            Checkout <i class="fas fa-arrow-right"></i>
        </div>
    </div>

<script>
        const params = new URLSearchParams(window.location.search);
        const shopEmail = params.get('email');
        
        // --- CONFIGURATION ---
        const API_BASE_URL = 'https://localcart-c6il.onrender.com';

        // Cart Structure update: Ab hum IDs use karenge taaki clash na ho
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        window.onload = async () => {
            if(!shopEmail) return window.location.href='customer_dashboard.html';
            fetchShopData();
            updateCartUI();
        };

        async function fetchShopData() {
            try {
                // Updated: Localhost ki jagah Render URL
                const res = await fetch(`${API_BASE_URL}/api/get-shop-all/${shopEmail}`);
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('b-name').innerText = data.shop.name || "Local Shop";
                    document.getElementById('b-deal').innerText = data.shop.dealIn || "General Store";
                    
                    if(data.shop.image) {
                        document.getElementById('b-img').style.backgroundImage = `url('${data.shop.image}')`;
                    }
                    renderItems(data.products, data.shop.name);
                }
            } catch (err) {
                console.error("Fetch error:", err);
                document.getElementById('item-list').innerHTML = "<p>Server se connect nahi ho pa raha... ⏳</p>";
            }
        }

        function renderItems(products, shopName) {
            const list = document.getElementById('item-list');
            list.innerHTML = "";
            
            if(products.length === 0) {
                list.innerHTML = "<p style='text-align:center; color:#999;'>No products listed yet.</p>";
                return;
            }

            products.forEach(p => {
                // Check if product is already in cart
                const cartItem = cart.find(item => item._id === p._id);
                
                const div = document.createElement('div');
                div.className = 'product-card-zomato';
                div.innerHTML = `
                    <div>
                        <h4 style="margin-bottom:5px;">${p.name}</h4>
                        <p style="font-weight:bold; color:#2f3542;">₹${p.price}</p>
                    </div>
                    <div id="btn-container-${p._id}">
                        ${cartItem ? getQtyControls(p._id, p.price, p.name, shopName) : 
                        `<button class="add-btn" onclick="addToCart('${p._id}', ${p.price}, '${p.name}', '${shopName}', '${p.shopEmail}')">ADD</button>`}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function getQtyControls(id, price, name, shopName) {
            const item = cart.find(i => i._id === id);
            return `
                <div class="qty-controls">
                    <span class="qty-btn" onclick="updateQty('${id}', -1)">-</span>
                    <span id="qty-${id}">${item ? item.qty : 0}</span>
                    <span class="qty-btn" onclick="updateQty('${id}', 1)">+</span>
                </div>
            `;
        }

        function addToCart(id, price, name, shopName, shopEmail) {
            // Cart mein object push kar rahe hain jo Checkout page ke liye zaroori hai
            cart.push({
                _id: id,
                name: name,
                price: price,
                qty: 1,
                shopName: shopName,
                shopEmail: shopEmail
            });
            saveAndRefresh();
        }

        function updateQty(id, change) {
            const itemIndex = cart.findIndex(i => i._id === id);
            if(itemIndex > -1) {
                cart[itemIndex].qty += change;
                if(cart[itemIndex].qty <= 0) {
                    cart.splice(itemIndex, 1);
                }
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('cart', JSON.stringify(cart));
            // Simple refresh instead of complex ID manipulation to avoid UI bugs
            location.reload(); 
        }

        function updateCartUI() {
            const strip = document.getElementById('cart-strip');
            let totalQty = 0;
            let totalAmt = 0;

            cart.forEach(item => {
                totalQty += item.qty;
                totalAmt += (item.qty * item.price);
            });

            if(totalQty > 0) {
                strip.style.display = "flex";
                document.getElementById('item-count').innerText = totalQty;
                document.getElementById('total-amount').innerText = totalAmt;
            } else {
                strip.style.display = "none";
            }
        }

        function checkout() {
            // Ab aapka checkout page live hai, toh wahan bhej do
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
