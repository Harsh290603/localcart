<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Dashboard | Local Cart</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Business Specific Styles */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center;
        }
        .stat-card i { font-size: 24px; color: #6c5ce7; margin-bottom: 10px; }
        .stat-card h3 { font-size: 28px; margin: 5px 0; color: #2f3542; }
        .stat-card p { color: #a4b0be; font-size: 14px; }

        .action-btn {
            background: #6c5ce7; color: white; border: none;
            padding: 12px 25px; border-radius: 10px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { background: #2f3542; transform: translateY(-2px); }
        
        .logout-btn {
            background: transparent; color: #ff4757; border: 1px solid #ff4757;
            padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .logout-btn:hover { background: #ff4757; color: white; }
    </style>
</head>
<body style="background: #f8f9fa;">

    <nav class="navbar">
        <div class="logo">Local<span>Cart</span> Business</div>
        <div class="nav-right" style="display: flex; align-items: center; gap: 20px;">
            <span id="biz-name" style="font-weight: bold; color: #2f3542;">Store Owner</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container" style="padding-top: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>Dashboard Overview</h1>
            <button class="action-btn" onclick="location.href='add_product.html'">
                <i class="fas fa-plus"></i> Add New Product
            </button>
        </div>

        <div class="stats-container">
            <div class="stat-card">
                <i class="fas fa-box"></i>
                <h3 id="total-products">0</h3>
                <p>Total Products</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-shopping-cart"></i>
                <h3 id="total-orders">0</h3>
                <p>New Orders</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-rupee-sign"></i>
                <h3 id="total-sales">0</h3>
                <p>Today's Sales</p>
            </div>
        </div>

        <div class="inventory-section" style="background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h2>Your Inventory</h2>
            <div id="product-list" style="margin-top: 20px;">
                <p style="text-align: center; color: #a4b0be;">Loading your products... ⏳</p>
            </div>
        </div>
    </div>

    <script>
        // --- 1. SECURITY & PERSISTENCE CHECK ---
        const userEmail = localStorage.getItem('userEmail');
        const userRole = localStorage.getItem('userRole');
        const userName = localStorage.getItem('userName');

        // Business role check
        if (!userEmail || userRole !== 'business') {
            window.location.replace('index.html');
        }

        // Set owner name
        if(userName) {
            document.getElementById('biz-name').innerText = userName;
        }

        const API_BASE_URL = 'https://localcart-c6il.onrender.com';

        window.onload = () => {
            fetchStoreData();
        };

        // --- 2. FETCH STORE DATA ---
        async function fetchStoreData() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/store-info?email=${userEmail}`);
                const data = await response.json();
                
                if(data.success) {
                    document.getElementById('total-products').innerText = data.productCount || 0;
                    document.getElementById('total-orders').innerText = data.orderCount || 0;
                    // Product list render karne ka logic yahan aayega
                    renderProducts(data.products);
                }
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            if(!products || products.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>No products added yet.</p>";
                return;
            }
            // Inventory rendering logic...
        }

        // --- 3. LOGOUT LOGIC ---
        function logout() {
            if(confirm("Bhai, logout pakka karna hai?")) {
                localStorage.clear();
                window.location.replace('index.html');
            }
        }
    </script>
</body>
</html>
