<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop View | Local Cart</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Shop Header Styling */
        .shop-hero { height: 280px; background-size: cover; background-position: center; position: relative; display: flex; align-items: flex-end; border-radius: 0 0 25px 25px; overflow: hidden; }
        .shop-hero-overlay { background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; padding: 40px; color: white; }
        
        /* Search Bar inside Shop */
        .shop-search-box { width: 100%; max-width: 500px; margin: 20px 0; position: relative; }
        .shop-search-box input { width: 100%; padding: 12px 45px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 15px; }
        .shop-search-box i { position: absolute; left: 15px; top: 15px; color: #aaa; }

        /* Product Card Updates */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding-bottom: 50px; }
        .p-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; }
        .p-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .p-img { height: 200px; width: 100%; object-fit: cover; cursor: pointer; background: #f9f9f9; }
        .p-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .p-info h4 { margin: 0 0 10px 0; font-size: 17px; color: #2f3542; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-info b { color: #2f3542; font-size: 20px; }
        
        /* Floating Cart */
        .cart-btn { position: fixed; bottom: 30px; right: 30px; background: #2f3542; color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: none; cursor: pointer; z-index: 999; display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .cart-count-badge { background: #ff4757; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; }

        .added-anim { background: #2ed573 !important; }
    </style>
</head>
<body style="background: #f8f9fa;">

    <nav class="navbar">
        <div class="logo" onclick="location.href='customer_dashboard.html'" style="cursor:pointer;">Local<span>Cart</span></div>
        <button class="logout-btn" onclick="location.href='customer_dashboard.html'"><i class="fas fa-arrow-left"></i> All Shops</button>
    </nav>

    <div id="shop-hero-section"></div>

    <div class="container">
        <div class="shop-search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="p-search" placeholder="Search items in this shop..." oninput="filterProducts()">
        </div>

        <h3 id="list-title" style="color:#2f3542; margin-bottom: 20px;">Available Products</h3>
        <div class="product-grid" id="product-list">
            <p style="text-align:center; grid-column: 1/-1; padding:50px;">Loading items... ⏳</p>
        </div>
    </div>

    <button class="cart-btn" onclick="location.href='cart.html'">
        <i class="fas fa-shopping-cart"></i> View Cart <span class="cart-count-badge" id="cart-count">0</span>
    </button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const shopEmail = params.get('email');
        
        // --- CONFIGURATION ---
        const API_BASE_URL = 'https://localcart-c6il.onrender.com';

        let currentShopProducts = [];
        let shopNameDisplay = ""; 
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');

        window.onload = () => {
            if(!shopEmail) {
                location.href = 'customer_dashboard.html';
                return;
            }
            loadShopData();
            updateCartUI();
        };

        async function loadShopData() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/get-shop-all/${shopEmail}`);
                const data = await res.json();
                
                if(data.success) {
                    shopNameDisplay = data.shop.name;
                    
                    // Shop Hero Section Update
                    document.getElementById('shop-hero-section').innerHTML = `
                        <div class="shop-hero" style="background-image: url('${data.shop.image || 'https://via.placeholder.com/1200x400'}')">
                            <div class="shop-hero-overlay">
                                <h1 style="margin:0;">${data.shop.name}</h1>
                                <p style="margin-top:10px;"><i class="fas fa-map-marker-alt"></i> ${data.shop.address}</p>
                            </div>
                        </div>
                    `;

                    // Sirf wahi products dikhayenge jo "In Stock" hain
                    currentShopProducts = data.products.filter(p => p.inStock !== false);
                    renderProducts(currentShopProducts);
                }
            } catch (err) { 
                console.error("Shop Load Error:", err);
                document.getElementById('product-list').innerHTML = "<p style='text-align:center; grid-column:1/-1;'>Server error! Backend check karein. ❌</p>";
            }
        }

        function renderProducts(items) {
            const list = document.getElementById('product-list');
            list.innerHTML = items.length ? "" : "<p style='grid-column:1/-1; text-align:center;'>Abhi is dukan mein koi saaman nahi hai.</p>";
            
            items.forEach(p => {
                // Image handling
                const img = (p.images && p.images.length) ? p.images[0] : 'https://via.placeholder.com/200';
                
                // Naya Function: Abhi photo pe click hoga toh ye new page khulega
                const productStr = JSON.stringify(p).replace(/"/g, '&quot;');

                const card = document.createElement('div');
                card.className = 'p-card';
                card.innerHTML = `
                    <img src="${img}" class="p-img" onclick="openProductPage('${productStr}')">
                    <div class="p-info">
                        <h4>${p.name}</h4>
                        <div>
                            <b>₹${p.price}</b>
                            <button id="btn-${p._id}" onclick="addToCart('${p._id}')" class="main-btn" style="padding:10px; margin-top:15px; width:100%; background:#2ed573;">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function filterProducts() {
            const query = document.getElementById('p-search').value.toLowerCase();
            const filtered = currentShopProducts.filter(p => 
                p.name.toLowerCase().includes(query) || 
                (p.category && p.category.toLowerCase().includes(query))
            );
            renderProducts(filtered);
        }

        // --- NEW: REDIRECT TO PRODUCT PAGE LOGIC ---
        function openProductPage(productStr) {
            localStorage.setItem('viewProduct', productStr);
            localStorage.setItem('currentShopName', shopNameDisplay); // Store shop name too
            window.location.href = 'product_details.html';
        }

        // --- CART LOGIC ---
        function addToCart(id) {
            const prod = currentShopProducts.find(p => p._id === id);
            const exists = cart.find(item => item._id === id);
            
            if(exists) {
                exists.qty += 1;
            } else {
                // Shop details bhi save kar rahe hain taaki Cart page par dukan ka naam dikhe
                cart.push({ 
                    ...prod, 
                    qty: 1, 
                    shopEmail: shopEmail, 
                    shopName: shopNameDisplay 
                }); 
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();

            // Button Feedback Animation
            const btn = document.getElementById(`btn-${id}`);
            if(btn) {
                const originalText = btn.innerHTML;
                btn.innerHTML = "<i class='fas fa-check'></i> Added";
                btn.classList.add('added-anim');
                setTimeout(() => { 
                    btn.innerHTML = originalText; 
                    btn.classList.remove('added-anim');
                }, 1000);
            }
        }

        function updateCartUI() {
            const count = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count').innerText = count;
        }
    </script>
</body>
</html>
